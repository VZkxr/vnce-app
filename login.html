<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Vanacue</title>
    <link rel="icon" type="image/png" href="Multimedia/vnce_4.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        /* === RESET & BASE === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background-color: #000;
        }

        /* === FONDO === */
        .auth-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* AJUSTE: Rojo mucho más oscuro en el centro */
            background: radial-gradient(circle at center, #220303 0%, #000000 100%);
            z-index: 0;
        }

        /* === PARTÍCULAS (Contenedor) === */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Estilo de la partícula (Lluvia Roja) */
        .particle {
            position: absolute;
            background: rgba(229, 9, 20, 0.7);
            /* Rojo Vanacue */
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 8px rgba(229, 9, 20, 0.4);
            top: -15px;
            /* Empiezan arriba fuera de pantalla */
        }

        /* Animación de Caída (Lluvia) */
        @keyframes fall {
            0% {
                transform: translateY(-10vh) translateX(0);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            100% {
                transform: translateY(110vh) translateX(20px);
                /* Caen hasta abajo */
                opacity: 0;
            }
        }

        /* === CONTENEDOR CENTRAL === */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            position: relative;
            z-index: 10;
            padding: 20px;
        }

        .form-box {
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
        }

        /* === HEADER DEL FORMULARIO === */
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-logo {
            width: 80px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 5px rgba(229, 9, 20, 0.5));
            transition: transform 0.3s;
        }

        .auth-logo:hover {
            transform: scale(1.05);
        }

        .auth-header h2 {
            color: #fff;
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .auth-header p {
            color: #b3b3b3;
            font-size: 0.95rem;
        }

        /* === INPUTS === */
        .input-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 20px;
        }

        .input-wrapper input {
            width: 100%;
            background: #333;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 16px;
            padding-right: 45px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-wrapper input::placeholder {
            color: #8c8c8c;
        }

        .input-wrapper input:focus {
            background: #454545;
            border-bottom: 2px solid #e50914;
        }

        .input-wrapper input.success {
            border: 1px solid #00ff00;
        }

        .input-wrapper input.error {
            border: 1px solid #ff3333;
        }

        .input-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            object-fit: contain;
            user-select: none;
        }

        .toggle-password {
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .toggle-password:hover {
            opacity: 1;
        }

        .input-feedback {
            font-size: 0.75rem;
            color: #ff3333;
            position: absolute;
            bottom: -18px;
            left: 0;
            display: none;
        }

        /* === BOTONES === */
        button {
            width: 100%;
            padding: 14px;
            background-color: #e50914;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #f40612;
        }

        /* === SWITCH TEXT === */
        .switch-text {
            margin-top: 20px;
            color: #737373;
            text-align: center;
            font-size: 0.95rem;
        }

        .switch-text a {
            color: white;
            text-decoration: none;
            margin-left: 5px;
        }

        .switch-text a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }

        /* Inputs Código */
        .code-inputs {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 20px;
        }

        .code-inputs input {
            width: 60px;
            height: 60px;
            text-align: center;
            font-size: 1.5rem;
            background: #333;
            border: 1px solid #333;
            border-radius: 4px;
            color: white;
        }
    </style>
</head>

<body>

    <div class="auth-background"></div>
    <div id="particles"></div>

    <div class="auth-container">
        <div class="form-box">
            <div class="auth-header">
                <img src="Multimedia/vnce_4.png" alt="Vanacue Logo" class="auth-logo">
                <h2 id="form-title">Bienvenido</h2>
                <p id="form-subtitle">Ingresa para continuar</p>
            </div>

            <form id="login-form">
                <div class="input-wrapper">
                    <input type="text" id="login-user" placeholder="Usuario" required autocomplete="off">
                </div>
                <div class="input-wrapper">
                    <input type="password" id="login-pass" placeholder="Contraseña" required>
                    <img src="Multimedia/eye-open.svg" class="input-icon toggle-password" id="login-eye">
                </div>
                <div style="text-align: right; margin-bottom: 15px;">
                    <a href="#" id="show-reset"
                        style="color: #b3b3b3; font-size: 0.85rem; text-decoration: none;">¿Olvidaste tu contraseña?</a>
                </div>
                <button type="submit">Iniciar Sesión</button>
                <p class="switch-text">
                    ¿Nuevo en Vanacue? <a href="#" id="show-register">Regístrate ahora</a>
                </p>
            </form>

            <form id="register-form" class="hidden">
                <div class="input-wrapper">
                    <input type="text" placeholder="Usuario (min 4 letras)" required autocomplete="off">
                    <img src="" id="user-status-icon" class="input-icon" style="display:none">
                    <span id="user-feedback-msg" class="input-feedback"></span>
                </div>

                <div class="input-wrapper">
                    <input type="email" placeholder="Correo electrónico" required>
                </div>

                <div class="input-wrapper">
                    <input type="password" id="reg-password" placeholder="Contraseña (min 8 caracteres)" required>
                    <img src="Multimedia/eye-open.svg" class="input-icon toggle-password" id="reg-eye">
                </div>

                <div class="terms-wrapper" style="margin: 15px 0; display: flex; align-items: flex-start; gap: 10px;">
                    <input type="checkbox" id="terms-check" required style="width: 18px; height: 18px; margin-top: 2px; cursor: pointer; accent-color: #e50914;">
                    <label for="terms-check" style="color: #ccc; font-size: 0.85rem; line-height: 1.4; cursor: pointer;">
                        He leído y acepto los <a href="terminos.html" target="_blank" style="color: #e50914; text-decoration: none; font-weight: 600;">Términos y Condiciones</a>.
                    </label>
                </div>

                <button type="submit">Registrarse</button>
                <p class="switch-text">
                    ¿Ya tienes cuenta? <a href="#" id="show-login">Inicia sesión</a>
                </p>
            </form>

            <form id="verify-form" class="hidden">
                <div class="code-inputs">
                    <input type="text" maxlength="1" required>
                    <input type="text" maxlength="1" required>
                    <input type="text" maxlength="1" required>
                    <input type="text" maxlength="1" required>
                </div>
                <button type="submit">Verificar Código</button>
            </form>
            <form id="reset-form" class="hidden">
                <div id="reset-step-1">
                    <div class="input-wrapper">
                        <input type="email" id="reset-email" placeholder="Tu correo registrado" required>
                    </div>
                    <button type="button" id="btn-send-code">Enviar Código de Recuperación</button>
                </div>

                <div id="reset-step-2" class="hidden">
                    <p style="color: #00ff00; text-align: center; font-size: 0.9rem; margin-bottom: 15px;">Código
                        enviado. Revisa tu correo.</p>

                    <div class="input-wrapper">
                        <input type="text" id="reset-code" placeholder="Código (6 dígitos)" required>
                    </div>

                    <div class="input-wrapper">
                        <input type="password" id="reset-new-pass" placeholder="Nueva Contraseña" required>
                    </div>

                    <button type="button" id="btn-confirm-reset">Guardar Nueva Contraseña</button>
                </div>

                <p class="switch-text">
                    <a href="#" id="back-from-reset">Volver al Login</a>
                </p>
            </form>
        </div>
    </div>


    <script src="config.js"></script>
    <script>
        // === SISTEMA DE PARTÍCULAS: LLUVIA AUTOMÁTICA (OPTIMIZADO) ===
        const particlesContainer = document.getElementById('particles');

        // Modificamos la función para aceptar un parámetro "isInitial"
        function createRainParticle(isInitial = false) {
            const particle = document.createElement('div');
            particle.classList.add('particle');

            // Posición horizontal aleatoria
            particle.style.left = Math.random() * 100 + 'vw';

            // Tamaño aleatorio (4px a 8px)
            const size = Math.random() * 4 + 4;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';

            // Duración de la caída (8s a 15s)
            const duration = Math.random() * 7 + 8;
            particle.style.animation = `fall ${duration}s linear forwards`;

            // Opacidad
            particle.style.opacity = Math.random() * 0.5 + 0.3;

            let timeToLive = duration * 1000;

            // === LA MAGIA PARA QUE YA ESTÉN CAYENDO ===
            if (isInitial) {
                // Calculamos un tiempo aleatorio que "ya pasó" (entre 0 y la duración total)
                const timePassed = Math.random() * duration;

                // Aplicamos delay negativo: el navegador renderiza la partícula a mitad de camino
                particle.style.animationDelay = `-${timePassed}s`;

                // Ajustamos el tiempo de vida para borrarla justo cuando termine
                timeToLive = (duration - timePassed) * 1000;
            }

            particlesContainer.appendChild(particle);

            // Limpieza del DOM
            setTimeout(() => {
                particle.remove();
            }, timeToLive);
        }

        // 1. INICIALIZACIÓN INSTANTÁNEA (Pre-llenado de pantalla)
        // Generamos 100 partículas de golpe con tiempos avanzados
        for (let i = 0; i < 100; i++) {
            createRainParticle(true);
        }

        // 2. GENERACIÓN CONTINUA (Mantiene la lluvia)
        setInterval(() => createRainParticle(false), 70);


        // === LÓGICA DEL SISTEMA ===
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const verifyForm = document.getElementById('verify-form');
        const title = document.getElementById('form-title');
        const subtitle = document.getElementById('form-subtitle');
        const feedbackMsg = document.createElement('p');
        feedbackMsg.style.textAlign = 'center'; feedbackMsg.style.marginTop = '15px'; feedbackMsg.style.color = '#ff3333';
        document.querySelector('.form-box').appendChild(feedbackMsg);

        const regUsernameInput = registerForm.querySelector('input[type="text"]');
        const regEmailInput = registerForm.querySelector('input[type="email"]');
        const regPassInput = document.getElementById('reg-password');

        const userStatusIcon = document.getElementById('user-status-icon');
        const userFeedbackMsg = document.getElementById('user-feedback-msg');
        const regEyeBtn = document.getElementById('reg-eye');
        const loginEyeBtn = document.getElementById('login-eye');
        const loginPassInput = document.getElementById('login-pass');

        // Lógica de LOGIN
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Usamos el mensaje de feedback que ya creaste dinámicamente
            feedbackMsg.style.color = '#fff';
            feedbackMsg.innerText = "Verificando credenciales...";

            const username = document.getElementById('login-user').value;
            const password = loginPassInput.value;

            try {
                const response = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    feedbackMsg.style.color = '#00ff00'; // Verde éxito
                    feedbackMsg.innerText = "¡Acceso concedido!";

                    // === AQUÍ CUMPLIMOS EL REQUERIMIENTO 2 ===
                    // Guardamos el token en localStorage. Esto persiste aunque cierren el navegador.
                    localStorage.setItem('vanacue_token', data.token);
                    localStorage.setItem('vanacue_user', JSON.stringify(data.user));

                    // Redirigir al inicio (asumo que tu página principal se llama index.html)
                    setTimeout(() => {
                        window.location.href = 'index.html' + window.location.search;
                    }, 1000);

                } else {
                    feedbackMsg.style.color = '#ff3333'; // Rojo error
                    feedbackMsg.innerText = data.message;
                }

            } catch (error) {
                console.error(error);
                feedbackMsg.style.color = '#ff3333';
                feedbackMsg.innerText = "Error de conexión con el servidor.";
            }
        });

        // Toggle Password
        function togglePassword(input, icon) {
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);
            icon.src = type === 'password' ? 'Multimedia/eye-open.svg' : 'Multimedia/eye-close.svg';
        }
        if (regEyeBtn) regEyeBtn.addEventListener('click', () => togglePassword(regPassInput, regEyeBtn));
        if (loginEyeBtn) loginEyeBtn.addEventListener('click', () => togglePassword(loginPassInput, loginEyeBtn));

        // Navegación
        document.getElementById('show-register').addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.classList.add('hidden'); registerForm.classList.remove('hidden');
            title.innerText = "Únete a Vanacue"; subtitle.innerText = "Disfruta de contenido ilimitado"; feedbackMsg.innerText = "";
        });
        document.getElementById('show-login').addEventListener('click', (e) => {
            e.preventDefault();
            registerForm.classList.add('hidden'); loginForm.classList.remove('hidden');
            title.innerText = "Bienvenido"; subtitle.innerText = "Ingresa para continuar"; feedbackMsg.innerText = "";
        });

        // Validación Usuario
        regUsernameInput.addEventListener('blur', async () => {
            const username = regUsernameInput.value;
            if (username.length > 0 && username.length < 4) { setMsg("Mínimo 4 caracteres", false); return; }
            if (username.length === 0) return;

            try {
                const response = await fetch(`${API_URL}/api/check-username`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });
                const data = await response.json();
                if (!data.available) { setMsg(data.error || "No disponible", false); }
                else { setMsg(null, true); }
            } catch (error) { console.error(error); }
        });

        function setMsg(msg, success) {
            if (success) {
                regUsernameInput.classList.add('success'); regUsernameInput.classList.remove('error');
                userStatusIcon.src = 'Multimedia/auth-check.svg'; userStatusIcon.style.display = 'block';
                userFeedbackMsg.style.display = 'none';
            } else {
                regUsernameInput.classList.add('error'); regUsernameInput.classList.remove('success');
                userStatusIcon.src = 'Multimedia/auth-fail.svg'; userStatusIcon.style.display = 'block';
                userFeedbackMsg.textContent = msg; userFeedbackMsg.style.display = 'block';
            }
        }

        regUsernameInput.addEventListener('input', () => {
            regUsernameInput.classList.remove('success', 'error');
            userStatusIcon.style.display = 'none'; userFeedbackMsg.style.display = 'none';
        });

        // Registro
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            feedbackMsg.style.color = '#fff'; feedbackMsg.innerText = "Procesando...";
            const userData = { username: regUsernameInput.value, email: regEmailInput.value, password: regPassInput.value };

            try {
                const response = await fetch(`${API_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                const data = await response.json();

                if (data.success) {
                    registerForm.classList.add('hidden'); verifyForm.classList.remove('hidden');
                    title.innerText = "Verificación"; subtitle.innerText = `Código enviado a ${userData.email}`;
                    feedbackMsg.innerText = ""; localStorage.setItem('temp_username', userData.username);
                } else {
                    feedbackMsg.style.color = '#ff3333'; feedbackMsg.innerText = data.message;
                }
            } catch (error) { feedbackMsg.innerText = "Error de conexión."; }
        });

        // Verificación
        verifyForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            let code = "";
            verifyForm.querySelectorAll('input').forEach(i => code += i.value);
            const username = localStorage.getItem('temp_username');

            try {
                const response = await fetch(`${API_URL}/api/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, code })
                });
                const data = await response.json();
                if (data.success) {
                    alert("¡Cuenta verificada!"); window.location.reload();
                } else {
                    feedbackMsg.style.color = '#ff3333'; feedbackMsg.innerText = data.message;
                }
            } catch (error) { feedbackMsg.innerText = "Error de conexión."; }
        });

        // UX Código
        const codeInputs = document.querySelectorAll('.code-inputs input');
        codeInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < 3) codeInputs[index + 1].focus();
            });
        });

        // === LÓGICA DE RECUPERACIÓN DE CONTRASEÑA (NUEVO) ===
        const resetForm = document.getElementById('reset-form');
        const showResetBtn = document.getElementById('show-reset');
        const backFromResetBtn = document.getElementById('back-from-reset');

        // 1. Navegación: Ir a Recuperar Contraseña
        showResetBtn.addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.classList.add('hidden');
            resetForm.classList.remove('hidden');
            title.innerText = "Recuperar Cuenta";
            subtitle.innerText = "Ingresa tu correo para buscarte";
            feedbackMsg.innerText = "";
        });

        // 2. Navegación: Volver al Login
        backFromResetBtn.addEventListener('click', (e) => {
            e.preventDefault();
            resetForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
            title.innerText = "Bienvenido";
            subtitle.innerText = "Ingresa para continuar";

            // Reiniciar pasos del reset por si vuelve a entrar
            document.getElementById('reset-step-1').classList.remove('hidden');
            document.getElementById('reset-step-2').classList.add('hidden');
            feedbackMsg.innerText = "";
        });

        // 3. Paso 1: Enviar Correo
        document.getElementById('btn-send-code').addEventListener('click', async () => {
            const email = document.getElementById('reset-email').value;
            if (!email) { feedbackMsg.style.color = '#ff3333'; feedbackMsg.innerText = "Escribe tu correo."; return; }

            feedbackMsg.style.color = '#fff'; feedbackMsg.innerText = "Enviando código...";

            try {
                const res = await fetch(`${API_URL}/api/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (data.success) {
                    feedbackMsg.innerText = "";
                    document.getElementById('reset-step-1').classList.add('hidden');
                    document.getElementById('reset-step-2').classList.remove('hidden');
                    subtitle.innerText = "Ingresa el código y tu nueva clave";
                } else {
                    feedbackMsg.style.color = '#ff3333'; feedbackMsg.innerText = data.message;
                }
            } catch (err) {
                feedbackMsg.innerText = "Error de conexión.";
            }
        });

        // 4. Paso 2: Confirmar Cambio
        document.getElementById('btn-confirm-reset').addEventListener('click', async () => {
            const email = document.getElementById('reset-email').value;
            const code = document.getElementById('reset-code').value;
            const newPassword = document.getElementById('reset-new-pass').value;

            if (!code || !newPassword) { feedbackMsg.style.color = '#ff3333'; feedbackMsg.innerText = "Llena todos los campos."; return; }

            try {
                const res = await fetch(`${API_URL}/api/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code, newPassword })
                });
                const data = await res.json();

                if (data.success) {
                    alert(data.message);
                    backFromResetBtn.click(); // Volver al login automáticamente
                } else {
                    feedbackMsg.style.color = '#ff3333'; feedbackMsg.innerText = data.message;
                }
            } catch (err) {
                feedbackMsg.innerText = "Error al restablecer.";
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/disable-devtool@latest"></script>
    <script>
        // Configuración personalizada de disable-devtool
        DisableDevtool({
            ondevtoolopen: function (type, next) {
                // Redirigir a Google
                window.location.href = 'https://www.google.com';
                // Intentar cerrar la ventana después de un breve retraso
                setTimeout(function () {
                    window.close();
                }, 100);
            },
            clearLog: true,
            disableSelect: true,
            disableCopy: true,
            disableCut: true,
            disablePaste: false,
            interval: 500,
            shortcuts: {
                f12: true,
                ctrlShiftI: true,
                ctrlShiftJ: true,
                ctrlShiftC: true,
                ctrlU: true
            }
        });
    </script>
</body>

</html>
